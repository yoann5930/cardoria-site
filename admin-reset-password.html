<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Réinitialisation mot de passe — Cardoria Admin</title><meta name="robots" content="noindex,nofollow"><link rel="stylesheet" href="style.css"><link rel="icon" href="assets/logo/cardoria-premium.png"><script src="js/seo-config.js"></script></head><body><header class="header"><div class="container nav"><a class="brand" href="index.html"><img src="assets/logo/cardoria-premium.png" onerror="this.src='logo-cardoria.jpg'" alt="Cardoria"><span>CARDORIA</span></a></div></header><main class="container"><section class="login panel"><h1>Mot de passe admin</h1><div id="requestBlock"><label for="resetEmail">Email administrateur</label><input id="resetEmail" type="email" placeholder="admin@cardoria.fr"><button class="primary" type="button" id="requestReset">Envoyer le lien</button></div><div id="confirmBlock" style="display:none"><label for="newPassword">Nouveau mot de passe</label><input id="newPassword" type="password" placeholder="Min. 10 caractères"><button class="primary" type="button" id="confirmReset">Enregistrer</button></div><p id="resetMsg" class="small" style="margin-top:12px"></p><p class="small"><a href="admin-login.html">Retour connexion</a></p></section></main><script>
(function(){
var BACKEND=(window.CARDORIA_SEO&&CARDORIA_SEO.backendUrl)||"https://cardoria-site-2.onrender.com";
var params=new URLSearchParams(location.search);
var token=params.get("token");
var msg=document.getElementById("resetMsg");
if(token){document.getElementById("requestBlock").style.display="none";document.getElementById("confirmBlock").style.display="block";}
document.getElementById("requestReset").onclick=function(){
var email=document.getElementById("resetEmail").value.trim();
if(!email){msg.textContent="Indiquez votre email.";return;}
fetch(BACKEND+"/api/auth/password/request",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email})})
.then(function(r){return r.json()}).then(function(d){msg.textContent=d.message||"Si le compte existe, un email a été envoyé.";})
.catch(function(){msg.textContent="Erreur réseau.";});
};
document.getElementById("confirmReset").onclick=function(){
var password=document.getElementById("newPassword").value;
if(password.length<10){msg.textContent="Mot de passe trop court (min. 10).";return;}
fetch(BACKEND+"/api/auth/password/confirm",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:token,password:password})})
.then(function(r){return r.json()}).then(function(d){
if(d.ok){msg.textContent="Mot de passe mis à jour. Redirection…";setTimeout(function(){location.href="admin-login.html"},1500);}
else msg.textContent=d.error||"Erreur.";
}).catch(function(){msg.textContent="Erreur réseau.";});
};
})();
</script></body></html>
